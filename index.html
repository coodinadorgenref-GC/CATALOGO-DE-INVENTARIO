<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Barata del Hogar - Catálogo Maestro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .accent-camejo { color: #22b14c; }
        .bg-camejo { background-color: #22b14c; }
        .border-camejo:hover { border-color: #22b14c; }
        
        /* Estilos del Dropdown de Marcas */
        .dropdown-marcas {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #1e293b;
            min-width: 220px;
            max-height: 350px;
            overflow-y: auto;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 1000;
            border-radius: 12px;
            margin-top: 6px;
            border: 1px solid #334155;
        }
        .dropdown-content a {
            color: #cbd5e1;
            padding: 10px 16px;
            text-decoration: none;
            display: block;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .dropdown-content a:hover {
            background-color: #059669;
            color: white;
        }
        .dropdown-content .active {
            background-color: #059669;
            color: white;
        }
        .dropdown-content.show {
            display: block;
        }

        /* Estilo de Paginación Interactiva */
        .paginacion-btn {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #cbd5e1;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .paginacion-btn:hover:not(:disabled) {
            background-color: #334155;
            color: white;
        }
        .paginacion-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .paginacion-btn.activa {
            background-color: #059669;
            border-color: #059669;
            color: white;
        }

        /* Estilo de Compatibilidad */
        .compatibilidad-container {
            background-color: #151f32;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #1e293b;
        }
        .compatibilidad-marca {
            color: #22b14c;
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #23324d;
            padding-bottom: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lista-compatibilidad-modal { list-style: none; padding: 0; margin: 0; }
        .lista-compatibilidad-modal li {
            position: relative;
            padding-left: 1.25rem;
            margin-bottom: 0.35rem;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
        }
        .lista-compatibilidad-modal li::before {
            content: "•";
            color: #22b14c;
            font-weight: bold;
            font-size: 1.2rem;
            position: absolute;
            left: 2px;
            top: -2px;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hidden-element { display: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div id="modal-detalles" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300" onclick="cerrarModalExterno(event)">

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby8wwWJc2kTMkYMW0DhqdzArsiA5m_G-yriDFNVVqxMTOVTdfMFoXVoasVYw6eLSNvf/exec";
        const TIEMPO_EXPIRACION_MS = 15 * 60 * 1000;
        const URL_FORM_ADMIN = "https://docs.google.com/forms/d/e/1FAIpQLSfLxU4Ijyu9jnw78D6ggEVBdOGwQR5PxlAW_PeFNa7snllqtg/viewform?entry.231242934=";

        let inventarioMaestro = [];
        let productosFiltradosGlobal = [];
        let usuarioActual = "";
        let tokenActual = "";
        let esAdmin = false;
        let marcaSeleccionadaActual = "TODAS";
        let familiaSeleccionadaActual = [];
        let criterioOrdenacionActual = "AZ";

        let paginaActual = 1;
        const tarjetasPorPagina = 9;

        window.onload = function() {
            verificarSesionGuardada();
            
            document.addEventListener('click', function() {
                const dropdown = document.getElementById('lista-marcas-dropdown');
                if(dropdown) dropdown.classList.remove('show');
            });
        };

        function verificarSesionGuardada() {
            const sesionStr = localStorage.getItem("sesion_catalogo");
            if (!sesionStr) {
                document.getElementById('cargando-datos').classList.add('hidden');
                return;
            }

            const sesion = JSON.parse(sesionStr);
            const tiempoActual = new Date().getTime();

            if (tiempoActual - sesion.timestamp > TIEMPO_EXPIRACION_MS) {
                cerrarSesion();
            } else {
                usuarioActual = sesion.correo;
                tokenActual = sesion.token;
                esAdmin = sesion.esAdmin || false;
                document.getElementById('nombre-usuario').innerText = sesion.nombre;
                
                document.getElementById('vista-login').classList.add('hidden');
                document.getElementById('vista-catalogo').classList.remove('hidden');
                document.getElementById('cargando-datos').classList.remove('hidden');
                
                actualizarTimestampSesion();
                obtenerInventarioDesdeServidor();
            }
        }

        function generarHtmlContenedorImagen(url) {
            return `<img src="${url}" referrerpolicy="no-referrer" onerror="gestionarFalloImagenDrive(this)" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition duration-300">`;
        }

function forzarSincronizacionDatos() {
    actualizarTimestampSesion();
    
    // 1. Forzar la visibilidad del spinner
    const icono = document.getElementById('icono-sincronizar');
    const textoSincronizar = document.getElementById('texto-sincronizar');
    if (icono) icono.classList.add('animate-spin');
    if (textoSincronizar) {
        textoSincronizar.classList.remove('hidden'); // Aseguramos que se vea
        textoSincronizar.innerText = "Cargando...";
    }
    
    // 2. Ejecutar la descarga forzada (llamamos directamente a la lógica de fetch)
    // Para no duplicar código, puedes llamar a una versión limpia de la descarga
    obtenerInventarioDesdeServidor().then(() => {
        // Restaurar estado original al finalizar
        if (icono) icono.classList.remove('animate-spin');
        if (textoSincronizar) {
            textoSincronizar.innerText = "Actualizar";
            // Si el texto estaba oculto antes, puedes volver a ocultarlo si deseas
        }
    });
}

        function guardarSesionEnDispositivo(correo, token, nombre, esAdmin) {
            const tiempoActual = new Date().getTime();
            const datosSesion = {
                correo: correo,
                token: token,
                nombre: nombre,
                esAdmin: esAdmin,
                timestamp: tiempoActual
            };
            localStorage.setItem("sesion_catalogo", JSON.stringify(datosSesion));
        }

        function actualizarTimestampSesion() {
            const sesionStr = localStorage.getItem("sesion_catalogo");
            if (sesionStr) {
                const sesion = JSON.parse(sesionStr);
                sesion.timestamp = new Date().getTime();
                localStorage.setItem("sesion_catalogo", JSON.stringify(sesion));
            }
        }

        function cerrarSesion() {
            localStorage.removeItem("sesion_catalogo");
            location.reload();
        }

        async function manejarInicioDeSesion() {
            const correoInput = document.getElementById('input-correo');
            const errorEl = document.getElementById('error-login');
            const btnLogin = document.getElementById('btn-login');
            
            const correo = correoInput.value.trim();
            if (!correo) {
                errorEl.innerText = "Por favor, ingresa tu correo electrónico.";
                errorEl.className = "bg-red-950/50 text-red-400 text-xs font-semibold p-3 rounded-xl mb-4 text-center border border-red-900/50 block";
                return;
            }

            errorEl.className = "hidden";
            btnLogin.disabled = true;
            btnLogin.innerText = "Verificando...";

            try {
                const respuesta = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'login', correo: correo })
                });

                const resultado = await respuesta.json();

                if (resultado.success) {
                    usuarioActual = correo;
                    tokenActual = resultado.token;
                    esAdmin = resultado.esAdmin || false;
                    document.getElementById('nombre-usuario').innerText = resultado.nombre;
                    
                    guardarSesionEnDispositivo(correo, resultado.token, resultado.nombre, esAdmin);

                    document.getElementById('vista-login').classList.add('hidden');
                    document.getElementById('vista-catalogo').classList.remove('hidden');
                    document.getElementById('cargando-datos').classList.remove('hidden');
                    
                    await obtenerInventarioDesdeServidor();
                } else {
                    errorEl.innerText = resultado.message;
                    errorEl.className = "bg-red-950/50 text-red-400 text-xs font-semibold p-3 rounded-xl mb-4 text-center border border-red-900/50 block";
                    btnLogin.disabled = false;
                    btnLogin.innerText = "Acceder al Catálogo";
                }
            } catch (err) {
                errorEl.innerText = "Error de conexión con el servidor de acceso.";
                errorEl.className = "bg-red-950/50 text-red-400 text-xs font-semibold p-3 rounded-xl mb-4 text-center border border-red-900/50 block";
                btnLogin.disabled = false;
                btnLogin.innerText = "Acceder al Catálogo";
            }
        }

        function manejarTecladoLogin(e) {
            if (e.key === "Enter") {
                manejarInicioDeSesion();
            }
        }

async function obtenerInventarioDesdeServidor() {
    // 1. Intentar cargar desde el caché local al instante
    const cache = localStorage.getItem('inventario_cache');
    if (cache) {
        inventarioMaestro = JSON.parse(cache);
        console.log("Cargado desde caché local (instantáneo)");
        procesarDespuesDeCarga(); 
    }

    // 2. Hacer el fetch en segundo plano para obtener datos frescos
    try {
        const respuesta = await fetch(API_URL, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'obtenerInventario', token: tokenActual, correo: usuarioActual })
        });

        const resultado = await respuesta.json();

        if (resultado.success) {
            inventarioMaestro = resultado.data;
            // Guardar en caché para la próxima vez
            localStorage.setItem('inventario_cache', JSON.stringify(inventarioMaestro));
            procesarDespuesDeCarga();
        } else {
            console.error("Error al sincronizar: " + resultado.message);
        }
    } catch (err) {
        console.error("Error al actualizar inventario:", err);
    }
}
// --- FUNCIÓN PROTEGIDA PARA PROCESAR LA CARGA ---
function procesarDespuesDeCarga() {
    try {
        if (typeof construirDropdownMarcas === 'function') construirDropdownMarcas();
        if (typeof renderizarFiltrosFamilia === 'function') renderizarFiltrosFamilia();
        if (typeof filtrarProductos === 'function') filtrarProductos();
    } catch (e) {
        console.error("Error menor en renderizado (se continúa de todos modos):", e);
    }
    
    // Garantizamos que el spinner se oculte y se muestre el contenido
    try {
        const cargando = document.getElementById('cargando-datos');
        const principal = document.getElementById('contenedor-principal-catalogo');
        if (cargando) cargando.classList.add('hidden');
        if (principal) principal.classList.remove('hidden');
    } catch (e) {
        console.error("Error al ocultar el spinner: ", e);
    }
}

        function construirDropdownMarcas() {
            const contenedor = document.getElementById('lista-marcas-dropdown');
            if (!contenedor) return;

            const consulta = document.getElementById('buscador').value.toLowerCase().trim();

            // Actualización del bucle para generar marcasSet
            const marcasSet = new Set();
            // Normalizamos la consulta para búsqueda sin espacios
            const consultaLimpia = consulta.replace(/\s+/g, '');

            inventarioMaestro.forEach(item => {
                // 1. Construimos el texto base unificado
                const busquedaBase = (String(item.SKU || '') + String(item.Producto || '') + String(item.Marca || '') + String(item.Compatibilidad || '')).toLowerCase();
                
                // 2. Agregamos parte de admin si aplica
                const busquedaAdmin = esAdmin ? (busquedaBase + String(item.Pr_Numero_Parte || '').toLowerCase()) : busquedaBase;
                
                // 3. Normalizamos el texto del producto y la consulta
                const busquedaFinalSinEspacios = busquedaAdmin.replace(/\s+/g, '');
                
                const coincideTexto = !consultaLimpia || busquedaFinalSinEspacios.includes(consultaLimpia);
                
                if (coincideTexto && item.Marca && item.Marca.trim() !== "") {
                    marcasSet.add(item.Marca.trim().toUpperCase());
                }
            });

            const marcasOrdenadas = Array.from(marcasSet).sort();
            
            let htmlDropdown = `<a href="#" onclick="seleccionarMarcaDropdown(event, 'TODAS')" class="item-marca-option ${marcaSeleccionadaActual === 'TODAS' ? 'active' : ''}">TODAS</a>`;
            
            marcasOrdenadas.forEach(marca => {
                htmlDropdown += `<a href="#" onclick="seleccionarMarcaDropdown(event, '${marca}')" class="item-marca-option ${marcaSeleccionadaActual === marca ? 'active' : ''}">${marca}</a>`;
            });

            contenedor.innerHTML = htmlDropdown;
        }
        // --- FUNCION PARA DIBUJAR EL FILTRO DE FAMILIAS ---
        function renderizarFiltrosFamilia() {
            const contenedor = document.getElementById('filter-familia-container');
            if (!contenedor) return;
        
            const familias = [...new Set(inventarioMaestro.map(item => item.Familia || "Sin Familia"))].sort();
            
            let html = `<div class="flex flex-col gap-1 text-xs">`;
            
            familias.forEach(f => {
                // Verifica si la familia está en tu array de seleccionadas

        function optimizarEnlaceImagen(enlaceOriginal) {
            if (!enlaceOriginal || typeof enlaceOriginal !== 'string') {
                return 'https://placehold.co/400x300/1e293b/94a3b8?text=Sin+Foto';
            }
            let linkClean = enlaceOriginal.trim();
            
            if (linkClean.includes('drive.google.com/thumbnail') || linkClean.includes('googleusercontent.com')) {
                return linkClean;
            }

            let match = linkClean.match(/([-\w]{25,})/);
            if (match && match[0]) {
                return `https://drive.google.com/thumbnail?id=${match[0]}&sz=w600`;
            }
            return 'https://placehold.co/400x300/1e293b/94a3b8?text=Sin+Foto';
        }

        function construirControlesVisualesPaginacion(totalElementos) {
            const contenedorSuperior = document.getElementById('paginacion-superior');
            const contenedorInferior = document.getElementById('paginacion-inferior');
            
            const totalPaginas = Math.ceil(totalElementos / tarjetasPorPagina) || 1;

            if (totalElementos === 0) {
                const vacio = `<span class="text-slate-500 font-bold text-xs uppercase">Sin registros</span>`;
                contenedorSuperior.innerHTML = vacio;
                contenedorInferior.innerHTML = vacio;
                return;
            }

            const generarBloqueControles = () => {
                const fragmento = document.createElement('div');
                fragmento.className = "flex items-center gap-1.5 flex-wrap select-none";

                const btnAnterior = document.createElement('button');
                btnAnterior.className = "paginacion-btn";
                btnAnterior.innerHTML = `<i class="fa-solid fa-chevron-left mr-1"></i> Anterior`;
                btnAnterior.disabled = paginaActual === 1;
                btnAnterior.onclick = () => cambiarPagina(paginaActual - 1);
                fragmento.appendChild(btnAnterior);

                let inicioRango = Math.max(1, paginaActual - 1);
                let finRango = Math.min(totalPaginas, paginaActual + 1);

                if (inicioRango > 1) {
                    const btnPrimera = document.createElement('button');
                    btnPrimera.className = `paginacion-btn ${paginaActual === 1 ? 'activa' : ''}`;
                    btnPrimera.innerText = "1";
                    btnPrimera.onclick = () => cambiarPagina(1);
                    fragmento.appendChild(btnPrimera);

                    if (inicioRango > 2) {
                        const elipsis = document.createElement('span');
                        elipsis.className = "px-1 text-slate-500 font-bold text-sm";
                        elipsis.innerText = "...";
                        fragmento.appendChild(elipsis);
                    }
                }

                for (let i = inicioRango; i <= finRango; i++) {
                    const btnNum = document.createElement('button');
                    btnNum.className = `paginacion-btn ${paginaActual === i ? 'activa' : ''}`;
                    btnNum.innerText = i;
                    btnNum.onclick = () => cambiarPagina(i);
                    fragmento.appendChild(btnNum);
                }

                if (finRango < totalPaginas) {
                    if (finRango < totalPaginas - 1) {
                        const elipsis = document.createElement('span');
                        elipsis.className = "px-1 text-slate-500 font-bold text-sm";
                        elipsis.innerText = "...";
                        fragmento.appendChild(elipsis);
                    }

                    const btnUltima = document.createElement('button');
                    btnUltima.className = `paginacion-btn ${paginaActual === totalPaginas ? 'activa' : ''}`;
                    btnUltima.innerText = totalPaginas;
                    btnUltima.onclick = () => cambiarPagina(totalPaginas);
                    fragmento.appendChild(btnUltima);
                }

                const btnSiguiente = document.createElement('button');
                btnSiguiente.className = "paginacion-btn";
                btnSiguiente.innerHTML = `Siguiente <i class="fa-solid fa-chevron-right ml-1"></i>`;
                btnSiguiente.disabled = paginaActual >= totalPaginas;
                btnSiguiente.onclick = () => cambiarPagina(paginaActual + 1);
                fragmento.appendChild(btnSiguiente);

                return fragmento;
            };

            contenedorSuperior.innerHTML = "";
            contenedorInferior.innerHTML = "";
            contenedorSuperior.appendChild(generarBloqueControles());
            contenedorInferior.appendChild(generarBloqueControles());
        }

            nuevaCompatibilidad: nuevoTexto 
        })

    .then(() => {

        // 3. Ejecutamos tu función de sincronización que ya tiene el spinner y el re-filtrado
        // Esto hará que el usuario vea el aviso de "Cargando..." global

        alert("¡Cambios enviados correctamente!");

    .catch(err => {

    })
    .finally(() => {

        btn.innerText = "Guardar Cambios";
        btn.disabled = false;
    });

            if (event.key === "Enter") document.getElementById('buscador').blur();
        }

        function abrirZoomImagen(urlSrc) {
            const modalZoom = document.getElementById('modal-zoom-imagen');
            const imgAmpliada = document.getElementById('img-ampliada');
            imgAmpliada.src = urlSrc;
            modalZoom.classList.remove('opacity-0', 'pointer-events-none');
            imgAmpliada.classList.remove('scale-95');
            imgAmpliada.classList.add('scale-100');
        }

        function cerrarZoomImagen() {
            const modalZoom = document.getElementById('modal-zoom-imagen');
            const imgAmpliada = document.getElementById('img-ampliada');
            modalZoom.classList.add('opacity-0', 'pointer-events-none');
            imgAmpliada.classList.remove('scale-100');
            imgAmpliada.classList.add('scale-95');
        }
    </script>
</body>
</html>
