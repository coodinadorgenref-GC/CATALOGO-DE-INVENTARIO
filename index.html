<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Barata del Hogar - Catálogo Maestro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .accent-camejo { color: #22b14c; }
        .bg-camejo { background-color: #22b14c; }
        .border-camejo:hover { border-color: #22b14c; }
        
        /* Estilos del Dropdown de Marcas */
        .dropdown-marcas {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #1e293b;
            min-width: 220px;
            max-height: 350px;
            overflow-y: auto;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 1000;
            border-radius: 12px;
            margin-top: 6px;
            border: 1px solid #334155;
        }
        .dropdown-content a {
            color: #cbd5e1;
            padding: 10px 16px;
            text-decoration: none;
            display: block;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .dropdown-content a:hover {
            background-color: #059669;
            color: white;
        }
        .dropdown-content .active {
            background-color: #059669;
            color: white;
        }
        .dropdown-content.show {
            display: block;
        }

        /* Ocultar barra de scroll en listas */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Estilo de Compatibilidad tipo Imagen solicitada */
        .compatibilidad-container {
            background-color: #151f32;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #1e293b;
        }
        .compatibilidad-marca {
            color: #22b14c;
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #23324d;
            padding-bottom: 6px;
        }
        .lista-compatibilidad-modal { list-style: none; padding: 0; margin: 0; }
        .lista-compatibilidad-modal li {
            position: relative;
            padding-left: 1.25rem;
            margin-bottom: 0.35rem;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
        }
        .lista-compatibilidad-modal li::before {
            content: "•";
            color: #22b14c;
            font-weight: bold;
            font-size: 1.2rem;
            position: absolute;
            left: 2px;
            top: -2px;
        }

        /* Estilos Personalizados para Controles de Paginación */
        .paginacion-btn {
            background-color: #1e293b;
            color: #cbd5e1;
            border: 1px solid #334155;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .paginacion-btn:hover:not(:disabled) {
            background-color: #334155;
            color: white;
        }
        .paginacion-btn.activa {
            background-color: #22b14c;
            color: white;
            border-color: #22b14c;
        }
        .paginacion-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div id="vista-login" class="flex items-center justify-center min-h-screen px-4">
        <div class="bg-slate-800 text-slate-100 p-8 rounded-2xl shadow-2xl max-w-md w-full text-center border border-slate-700">
            <div class="text-4xl text-emerald-500 mb-3">
                <i class="fa-solid fa-motorcycle"></i>
            </div>
            <h1 class="text-2xl font-black text-white tracking-tight uppercase">La Barata del Hogar</h1>
            <p class="text-xs font-bold text-emerald-500 uppercase tracking-wider mb-6">Catálogo de Refacciones</p>
            
            <p class="text-sm text-slate-400 mb-6">Ingresa tu correo autorizado para acceder.</p>
            
            <div class="text-left mb-4">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-2">Correo Electrónico</label>
                <input type="email" id="input-correo" onkeydown="manejarTecladoLogin(event)" placeholder="ejemplo@gmail.com"
                        class="w-full px-4 py-3 border border-slate-700 rounded-xl bg-slate-900 text-white focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium">
            </div>

            <div id="error-login" class="hidden bg-red-950/50 text-red-400 text-xs font-semibold p-3 rounded-xl mb-4 text-center border border-red-900/50"></div>

            <button id="btn-login" onclick="manejarInicioDeSesion()" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-lg shadow-emerald-900/20 cursor-pointer">
                Acceder al Catálogo
            </button>
        </div>
    </div>

    <div id="vista-catalogo" class="hidden min-h-screen flex flex-col">
        <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 sticky top-0 z-50 shadow-md">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                <div>
                    <h2 class="text-lg font-black tracking-tight uppercase">La Barata del Hogar</h2>
                    <p class="text-xs text-slate-400">Usuario Activo: <span id="nombre-usuario" class="text-emerald-400 font-bold">---</span></p>
                </div>

                <div class="flex items-center gap-2 w-full md:w-auto">
                    <button id="btn-sincronizar" onclick="forzarSincronizacionDatos()" title="Actualizar datos" class="bg-slate-700 hover:bg-emerald-600 text-white text-sm font-bold p-2 px-3 rounded-xl transition cursor-pointer flex items-center gap-1 h-[38px]">
                        <i class="fa-solid fa-rotate" id="icono-sincronizar"></i> <span id="texto-sincronizar" class="hidden sm:inline">Actualizar</span>
                    </button>

                    <div class="dropdown-marcas">
                        <button id="btn-dropdown-marcas" onclick="alternarDropdownMarcas(event)" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white text-sm font-bold p-2 px-3 rounded-xl transition cursor-pointer flex items-center gap-2 h-[38px]">
                            <i class="fa-solid fa-motorcycle text-emerald-400"></i> <span id="texto-marca-seleccionada">Marca: TODAS</span> <i class="fa-solid fa-chevron-down text-[10px]"></i>
                        </button>
                        <div id="lista-marcas-dropdown" class="dropdown-content no-scrollbar"></div>
                    </div>

                    <div class="relative w-full md:w-80">
                        <span onclick="filtrarProductos()" class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 hover:text-emerald-400 transition-colors duration-150 cursor-pointer z-10">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <input type="text" id="buscador" oninput="ejecutarBusquedaCombinada()" onkeydown="manejarTecladoBuscador(event)" placeholder="Buscar por SKU, refacción..."
                                class="w-full pl-10 pr-10 py-2 rounded-xl bg-slate-900 border border-slate-700 text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm h-[38px]">
                        <span id="btn-limpiar-buscador" onclick="limpiarBuscadorTexto()" class="hidden absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 hover:text-red-400 transition-colors duration-150 cursor-pointer z-10 text-base">
                            <i class="fa-solid fa-circle-xmark"></i>
                        </span>
                    </div>
                </div>

                <button onclick="cerrarSesion()" class="bg-slate-700 hover:bg-red-900 text-white text-xs font-bold py-2 px-3 rounded-xl transition cursor-pointer">
                    <i class="fa-solid fa-right-from-bracket mr-1"></i> Salir
                </button>
            </div>
        </header>

        <div id="cargando-datos" class="flex-1 flex flex-col items-center justify-center p-8">
            <i class="fa-solid fa-rotate animate-spin text-4xl text-emerald-500 mb-4"></i>
            <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Cargando...</p>
        </div>

        <main id="contenido-catalogo" class="hidden flex-1 max-w-7xl w-full mx-auto p-6">
            <div class="flex flex-col md:flex-row gap-6">
                
                <aside class="w-full md:w-64 shrink-0 flex flex-col gap-5 sticky top-[90px] z-30 h-[calc(100vh-120px)] overflow-y-auto no-scrollbar pb-6">
                    
                    <div class="bg-slate-800 border border-slate-700 p-4 rounded-2xl">
                        <h3 class="text-xs font-bold uppercase tracking-wider text-emerald-400 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-arrow-down-a-z"></i> Ordenar Descripción
                        </h3>
                        <div class="flex flex-col gap-2">
                            <button id="btn-orden-az" onclick="establecerOrdenacion('A-Z')" class="w-full text-left bg-emerald-600 font-bold text-white text-sm py-2 px-4 rounded-xl transition cursor-pointer flex items-center justify-between">
                                <span>Alfabético (A-Z)</span> <i class="fa-solid fa-check check-orden"></i>
                            </button>
                            <button id="btn-orden-za" onclick="establecerOrdenacion('Z-A')" class="w-full text-left bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold text-sm py-2 px-4 rounded-xl transition cursor-pointer flex items-center justify-between">
                                <span>Alfabético (Z-A)</span> <i class="fa-solid fa-check check-orden hidden"></i>
                            </button>
                        </div>
                    </div>

                    <div class="bg-slate-800 border border-slate-700 p-4 rounded-2xl">
                        <h3 class="text-xs font-bold uppercase tracking-wider text-emerald-400 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-tags"></i> Categorías
                        </h3>
                        <div id="filtro-categorias" class="flex flex-col gap-1 max-h-40 overflow-y-auto pr-1">
                            </div>
                    </div>

                    <div class="bg-slate-800 border border-slate-700 p-4 rounded-2xl">
                        <h3 class="text-xs font-bold uppercase tracking-wider text-emerald-400 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-motorcycle"></i> Modelos / Moto
                        </h3>
                        <div id="filtro-modelos" class="flex flex-col gap-1 max-h-52 overflow-y-auto pr-1">
                            </div>
                    </div>

                </aside>

                <div class="flex-1 flex flex-col gap-4">
                    <div id="paginacion-superior" class="flex items-center justify-center gap-1 flex-wrap py-2"></div>
                    
                    <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                    
                    <div id="sin-resultados" class="hidden text-center py-16">
                        <div class="text-4xl text-slate-600 mb-3">
                            <i class="fa-solid fa-box-open"></i>
                        </div>
                        <p class="text-base font-semibold text-slate-400">No encontramos refacciones que coincidan con tu búsqueda o filtros.</p>
                    </div>
                    
                    <div id="paginacion-inferior" class="flex items-center justify-center gap-1 flex-wrap py-2 mt-4"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-detalles" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300" onclick="cerrarModalExterno(event)">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl max-w-md w-full max-h-[85vh] overflow-y-auto transform translate-y-4 transition-transform duration-300 relative" id="modal-contenido">
            <button onclick="alternarModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white bg-slate-900/50 hover:bg-slate-900 w-8 h-8 rounded-full flex items-center justify-center cursor-pointer text-xl z-10">×</button>
            <div id="modal-cuerpo" class="p-6"></div>
        </div>
    </div>

    <div id="modal-zoom-imagen" class="fixed inset-0 bg-black/95 z-[60] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300 select-none cursor-zoom-out" onclick="cerrarZoomImagen()">
        <button onclick="cerrarZoomImagen()" class="absolute top-6 right-6 text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 w-12 h-12 rounded-full flex items-center justify-center cursor-pointer text-2xl z-[70] shadow-xl border border-slate-700">×</button>
        <img id="img-ampliada" src="" alt="Vista ampliada" class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl transform scale-95 transition-transform duration-300">
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwylZa5BjmmbtoErSZJDj0kwW-rrZ0qLhT8d49p3elifvAikmuSvuFDxj05GTYyI77t/exec";
        const TIEMPO_EXPIRACION_MS = 15 * 60 * 1000;
        const URL_FORM_ADMIN = "https://docs.google.com/forms/d/e/1FAIpQLSfLxU4Ijyu9jnw78D6ggEVBdOGwQR5PxlAW_PeFNa7snllqtg/viewform?entry.231242934=";

        let inventarioMaestro = [];
        let usuarioActual = "";
        let tokenActual = "";
        let esAdmin = false;
        
        // VARIACIONES DE FILTRADO GLOBAL
        let marcaSeleccionadaActual = "TODAS"; 
        let categoriaSeleccionadaActual = "TODAS";
        let modeloSeleccionadoActual = "TODAS";

        // VARIABLES DE CONTROL ADICIONADAS PARA PAGINACIÓN Y ORDENACIÓN
        let paginaActual = 1;
        const tarjetasPorPagina = 12; // Ajustado a múltiplo de 3 idóneo para grids grandes
        let productosFiltradosGlobal = [];
        let criterioOrdenacionActual = "A-Z";

        window.onload = function() {
            verificarSesionGuardada();
            document.addEventListener('click', function() {
                const dropdown = document.getElementById('lista-marcas-dropdown');
                if(dropdown) dropdown.classList.remove('show');
            });
        };

        function verificarSesionGuardada() {
            const sesionStr = localStorage.getItem("sesion_catalogo");
            if (!sesionStr) {
                document.getElementById('cargando-datos').classList.add('hidden');
                return;
            }

            const sesion = JSON.parse(sesionStr);
            const tiempoActual = new Date().getTime();

            if (tiempoActual - sesion.timestamp > TIEMPO_EXPIRACION_MS) {
                cerrarSesion();
            } else {
                usuarioActual = sesion.correo;
                tokenActual = sesion.token;
                esAdmin = sesion.esAdmin || false;
                document.getElementById('nombre-usuario').innerText = sesion.nombre;
                                
                document.getElementById('vista-login').classList.add('hidden');
                document.getElementById('vista-catalogo').classList.remove('hidden');
                document.getElementById('cargando-datos').classList.remove('hidden');
                                
                actualizarTimestampSesion();
                obtenerInventarioDesdeServidor();
            }
        }

        function generarHtmlContenedorImagen(url) {
            return `<img src="${url}" referrerpolicy="no-referrer" onerror="gestionarFalloImagenDrive(this)" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition duration-300">`;
        }

        function forzarSincronizacionDatos() {
            actualizarTimestampSesion();
            const icono = document.getElementById('icono-sincronizar');
            const textoSincronizar = document.getElementById('texto-sincronizar');
            if (icono) icono.classList.add('animate-spin');
            if (textoSincronizar) textoSincronizar.innerText = "Cargando...";
                        
            document.getElementById('contenido-catalogo').classList.add('hidden');
            document.getElementById('cargando-datos').classList.remove('hidden');
                        
            obtenerInventarioDesdeServidor().then(() => {
                if (icono) icono.classList.remove('animate-spin');
                if (textoSincronizar) textoSincronizar.innerText = "Actualizar";
                filtrarProductos();
            }).catch(() => {
                if (icono) icono.classList.remove('animate-spin');
                if (textoSincronizar) textoSincronizar.innerText = "Actualizar";
            });
        }

        function guardarSesionEnDispositivo(correo, token, nombre, esAdmin) {
            const tiempoActual = new Date().getTime();
            const datosSesion = {
                correo: correo,
                token: token,
                nombre: nombre,
                esAdmin: esAdmin,
                timestamp: tiempoActual
            };
            localStorage.setItem("sesion_catalogo", JSON.stringify(datosSesion));
        }

        function actualizarTimestampSesion() {
            const sesionStr = localStorage.getItem("sesion_catalogo");
            if (sesionStr) {
                const sesion = JSON.parse(sesionStr);
                sesion.timestamp = new Date().getTime();
                localStorage.setItem("sesion_catalogo", JSON.stringify(sesion));
            }
        }

        function cerrarSesion() {
            localStorage.removeItem("sesion_catalogo");
            location.reload();
        }

        async function manejarInicioDeSesion() {
            const correoInput = document.getElementById('input-correo');
            const errorEl = document.getElementById('error-login');
            const btnLogin = document.getElementById('btn-login');
                        
            const correo = correoInput.value.trim();
            if (!correo) {
                errorEl.innerText = "Por favor, ingresa tu correo electrónico.";
                errorEl.className = "bg-red-950/50 text-red-400 text-xs font-semibold p-3 rounded-xl mb-4 text-center border border-red-900/50 block";
                return;
            }

            errorEl.className = "hidden";
            btnLogin.disabled = true;
            btnLogin.innerText = "Verificando...";

            try {
                const respuesta = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'login', correo: correo })
                });

                const resultado = await respuesta.json();

                if (resultado.success) {
                    usuarioActual = correo;
                    tokenActual = resultado.token;
                    esAdmin = resultado.esAdmin || false;
                    document.getElementById('nombre-usuario').innerText = resultado.nombre;
                                        
                    guardarSesionEnDispositivo(correo, resultado.token, resultado.nombre, esAdmin);

                    document.getElementById('vista-login').classList.add('hidden');
                    document.getElementById('vista-catalogo').classList.remove('hidden');
                    document.getElementById('cargando-datos').classList.remove('hidden');
                                        
                    await obtenerInventarioDesdeServidor();
                } else {
                    errorEl.innerText = resultado.message;
                    errorEl.className = "bg-red-950/50 text-red-400 text-xs font-semibold p-3 rounded-xl mb-4 text-center border border-red-900/50 block";
                    btnLogin.disabled = false;
                    btnLogin.innerText = "Acceder al Catálogo";
                }
            } catch (err) {
                errorEl.innerText = "Error de conexión con el servidor de acceso.";
                errorEl.className = "bg-red-950/50 text-red-400 text-xs font-semibold p-3 rounded-xl mb-4 text-center border border-red-900/50 block";
                btnLogin.disabled = false;
                btnLogin.innerText = "Acceder al Catálogo";
            }
        }

        function manejarTecladoLogin(e) {
            if (e.key === "Enter") {
                manejarInicioDeSesion();
            }
        }

        async function obtenerInventarioDesdeServidor() {
            try {
                const respuesta = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'obtenerInventario', token: tokenActual, correo: usuarioActual })
                });

                const resultado = await respuesta.json();

                if (resultado.success) {
                    inventarioMaestro = resultado.data;
                                        
                    construirDropdownMarcas();
                    construirFiltrosLaterales();
                    filtrarProductos();
                                        
                    document.getElementById('cargando-datos').classList.add('hidden');
                    document.getElementById('contenido-catalogo').classList.remove('hidden');
                } else {
                    alert("Error: " + resultado.message);
                    cerrarSesion();
                }
            } catch (err) {
                alert("Error crítico al cargar el inventario.");
            }
        }

        function construirDropdownMarcas() {
            const contenedor = document.getElementById('lista-marcas-dropdown');
            if (!contenedor) return;

            const marcasSet = new Set();
            inventarioMaestro.forEach(item => {
                if (item.Marca && item.Marca.trim() !== "") {
                    marcasSet.add(item.Marca.trim().toUpperCase());
                }
            });

            const marcasOrdenadas = Array.from(marcasSet).sort();
                        
            let htmlDropdown = `<a href="#" onclick="seleccionarMarcaDropdown(event, 'TODAS')" class="item-marca-option ${marcaSeleccionadaActual === 'TODAS' ? 'active' : ''}">TODAS</a>`;
                        
            marcasOrdenadas.forEach(marca => {
                htmlDropdown += `<a href="#" onclick="seleccionarMarcaDropdown(event, '${marca}')" class="item-marca-option ${marcaSeleccionadaActual === marca ? 'active' : ''}">${marca}</a>`;
            });

            contenedor.innerHTML = htmlDropdown;
        }

        function alternarDropdownMarcas(e) {
            e.stopPropagation(); 
            document.getElementById('lista-marcas-dropdown').classList.toggle('show');
        }

        function seleccionarMarcaDropdown(e, marca) {
            e.preventDefault();
            marcaSeleccionadaActual = marca;
            document.getElementById('texto-marca-seleccionada').innerText = `Marca: ${marca}`;
            document.querySelectorAll('.item-marca-option').forEach(el => el.classList.remove('active'));
            e.target.classList.add('active');
            
            paginaActual = 1;
            filtrarProductos();
        }

        // CONSTRUCCIÓN DINÁMICA DE CATEGORÍAS Y MODELOS EN LA ENTRADA DE DATOS
        function construirFiltrosLaterales() {
            const catContenedor = document.getElementById('filtro-categorias');
            const modContenedor = document.getElementById('filtro-modelos');

            const categoriasSet = new Set();
            const modelosSet = new Set();

            inventarioMaestro.forEach(item => {
                if (item.Categoria && item.Categoria.trim() !== "") {
                    categoriasSet.add(item.Categoria.trim());
                }
                if (item.Compatibilidad && item.Compatibilidad.trim() !== "") {
                    // Divide modelos si vienen separados por comas o saltos en la celda
                    const subModelos = item.Compatibilidad.split(/[\n,;\/]+/);
                    subModelos.forEach(m => {
                        let limpio = m.trim().toUpperCase();
                        if (limpio && limpio !== "UNIVERSAL" && limpio !== "TODAS") {
                            modelosSet.add(limpio);
                        }
                    });
                }
            });

            // 1. Renderizar Categorías
            let htmlCat = `<button onclick="establecerFiltroAsiduo('categoria', 'TODAS')" id="btn-cat-TODAS" class="w-full text-left py-1.5 px-3 text-xs rounded-lg font-bold flex justify-between items-center bg-emerald-600 text-white"><span>TODAS</span></button>`;
            Array.from(categoriasSet).sort().forEach(cat => {
                htmlCat += `<button onclick="establecerFiltroAsiduo('categoria', '${cat}')" id="btn-cat-${cat.replace(/\s+/g, '_')}" class="w-full text-left py-1.5 px-3 text-xs rounded-lg font-semibold text-slate-300 hover:bg-slate-700/50 hover:text-white flex justify-between items-center transition"><span>${cat}</span></button>`;
            });
            if(catContenedor) catContenedor.innerHTML = htmlCat;

            // 2. Renderizar Modelos
            let htmlMod = `<button onclick="establecerFiltroAsiduo('modelo', 'TODAS')" id="btn-mod-TODAS" class="w-full text-left py-1.5 px-3 text-xs rounded-lg font-bold flex justify-between items-center bg-emerald-600 text-white"><span>TODOS</span></button>`;
            Array.from(modelosSet).sort().forEach(mod => {
                htmlMod += `<button onclick="establecerFiltroAsiduo('modelo', '${mod}')" id="btn-mod-${mod.replace(/\s+/g, '_')}" class="w-full text-left py-1.5 px-3 text-xs rounded-lg font-semibold text-slate-300 hover:bg-slate-700/50 hover:text-white flex justify-between items-center transition"><span>${mod}</span></button>`;
            });
            if(modContenedor) modContenedor.innerHTML = htmlMod;
        }

        function establecerFiltroAsiduo(tipo, valor) {
            paginaActual = 1;
            if (tipo === 'categoria') {
                categoriaSeleccionadaActual = valor;
                // Alternar estilos visuales en botones de categoría
                document.querySelectorAll('#filtro-categorias button').forEach(b => {
                    b.className = "w-full text-left py-1.5 px-3 text-xs rounded-lg font-semibold text-slate-300 hover:bg-slate-700/50 hover:text-white flex justify-between items-center transition";
                });
                const idActivo = `btn-cat-${valor.replace(/\s+/g, '_')}`;
                if(document.getElementById(idActivo)) document.getElementById(idActivo).className = "w-full text-left py-1.5 px-3 text-xs rounded-lg font-bold flex justify-between items-center bg-emerald-600 text-white";
            } else if (tipo === 'modelo') {
                modeloSeleccionadoActual = valor;
                // Alternar estilos visuales en botones de modelos
                document.querySelectorAll('#filtro-modelos button').forEach(b => {
                    b.className = "w-full text-left py-1.5 px-3 text-xs rounded-lg font-semibold text-slate-300 hover:bg-slate-700/50 hover:text-white flex justify-between items-center transition";
                });
                const idActivo = `btn-mod-${valor.replace(/\s+/g, '_')}`;
                if(document.getElementById(idActivo)) document.getElementById(idActivo).className = "w-full text-left py-1.5 px-3 text-xs rounded-lg font-bold flex justify-between items-center bg-emerald-600 text-white";
            }
            filtrarProductos();
        }

        function ejecutarBusquedaCombinada() {
            paginaActual = 1;
            const bTexto = document.getElementById('buscador').value.trim();
            const btnLimpiar = document.getElementById('btn-limpiar-buscador');
            if (bTexto !== "") {
                if(btnLimpiar) btnLimpiar.classList.remove('hidden');
            } else {
                if(btnLimpiar) btnLimpiar.classList.add('hidden');
            }
            filtrarProductos();
        }

        function manejarTecladoBuscador(e) {
            if (e.key === "Escape") {
                limpiarBuscadorTexto();
            }
        }

        function limpiarBuscadorTexto() {
            document.getElementById('buscador').value = "";
            document.getElementById('btn-limpiar-buscador').classList.add('hidden');
            paginaActual = 1;
            filtrarProductos();
        }

        // CORAZÓN DEL SCRIPT: FILTRADO MULTI-CRITERIO INTEGRADO (Buscador + Marca + Categoría + Modelo)
        function filtrarProductos() {
            const consulta = document.getElementById('buscador').value.toLowerCase().trim();

            productosFiltradosGlobal = inventarioMaestro.filter(item => {
                // 1. Filtro por Buscador de texto
                const sku = String(item.SKU || '').toLowerCase();
                const prod = String(item.Producto || '').toLowerCase();
                const marca = String(item.Marca || '').toLowerCase();
                const comp = String(item.Compatibilidad || '').toLowerCase();
                
                const coincideTexto = !consulta || (sku.includes(consulta) || prod.includes(consulta) || marca.includes(consulta) || comp.includes(consulta));

                // 2. Filtro por Dropdown de Marca
                const coincideMarca = (marcaSeleccionadaActual === "TODAS") || (String(item.Marca || '').trim().toUpperCase() === marcaSeleccionadaActual);

                // 3. Filtro por Recuadro de Categorías
                const coincideCategoria = (categoriaSeleccionadaActual === "TODAS") || (String(item.Categoria || '').trim() === categoriaSeleccionadaActual);

                // 4. Filtro por Recuadro de Modelos
                let coincideModelo = false;
                if (modeloSeleccionadoActual === "TODAS") {
                    coincideModelo = true;
                } else {
                    const compCelda = String(item.Compatibilidad || '').toUpperCase();
                    if (compCelda.includes("UNIVERSAL") || compCelda.includes("TODAS") || compCelda.includes(modeloSeleccionadoActual)) {
                        coincideModelo = true;
                    }
                }

                return coincideTexto && coincideMarca && coincideCategoria && coincideModelo;
            });

            ejecutarOrdenacionYRenderizado();
        }

        // LÍNEA 422 REPARADA PERFECTAMENTE (Cierre del paréntesis del grupo regex adicionado)
        function optimizarEnlaceImagen(enlaceOriginal) {
            if (!enlaceOriginal || typeof enlaceOriginal !== 'string') {
                return 'https://placehold.co/400x300/1e293b/94a3b8?text=Sin+Foto';
            }
            let linkClean = enlaceOriginal.trim();
            
            if (linkClean.includes('drive.google.com/thumbnail') || linkClean.includes('googleusercontent.com')) {
                return linkClean;
            }

            let match = linkClean.match(/([-\w]{25,})/);
            if (match && match[0]) {
                return `https://drive.google.com/thumbnail?id=${match[0]}&sz=w600`;
            }
            return 'https://placehold.co/400x300/1e293b/94a3b8?text=Sin+Foto';
        }

        function gestionarFalloImagenDrive(imgElement) {
            imgElement.src = 'https://placehold.co/400x300/1e293b/94a3b8?text=Sin+Foto';
        }

        function establecerOrdenacion(criterio) {
            criterioOrdenacionActual = criterio;
            paginaActual = 1;

            const btnAZ = document.getElementById('btn-orden-az');
            const btnZA = document.getElementById('btn-orden-za');

            if (criterio === 'A-Z') {
                btnAZ.className = "w-full text-left bg-emerald-600 font-bold text-white text-sm py-2 px-4 rounded-xl transition cursor-pointer flex items-center justify-between";
                btnAZ.querySelector('.check-orden').classList.remove('hidden');
                btnZA.className = "w-full text-left bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold text-sm py-2 px-4 rounded-xl transition cursor-pointer flex items-center justify-between";
                btnZA.querySelector('.check-orden').classList.add('hidden');
            } else {
                btnZA.className = "w-full text-left bg-emerald-600 font-bold text-white text-sm py-2 px-4 rounded-xl transition cursor-pointer flex items-center justify-between";
                btnZA.querySelector('.check-orden').classList.remove('hidden');
                btnAZ.className = "w-full text-left bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold text-sm py-2 px-4 rounded-xl transition cursor-pointer flex items-center justify-between";
                btnAZ.querySelector('.check-orden').classList.add('hidden');
            }

            ejecutarOrdenacionYRenderizado();
        }

        function ejecutarOrdenacionYRenderizado() {
            if (criterioOrdenacionActual === 'A-Z') {
                productosFiltradosGlobal.sort((a, b) => (a.Producto || '').localeCompare(b.Producto || ''));
            } else if (criterioOrdenacionActual === 'Z-A') {
                productosFiltradosGlobal.sort((a, b) => (b.Producto || '').localeCompare(a.Producto || ''));
            }

            const grid = document.getElementById('grid-productos');
            const sinResultados = document.getElementById('sin-resultados');
            grid.innerHTML = "";

            if (productosFiltradosGlobal.length === 0) {
                sinResultados.classList.remove('hidden');
                construirControlesVisualesPaginacion(0);
                return;
            }
            sinResultados.classList.add('hidden');

            const indiceInicio = (paginaActual - 1) * tarjetasPorPagina;
            const indiceFin = indiceInicio + tarjetasPorPagina;
            const sublistaPagina = productosFiltradosGlobal.slice(indiceInicio, indiceFin);

            sublistaPagina.forEach((item) => {
                const tarjeta = document.createElement('div');
                tarjeta.className = "bg-slate-800 rounded-2xl overflow-hidden border border-slate-700 shadow-xl flex flex-col transition duration-200 group cursor-pointer border-camejo";
                
                tarjeta.onclick = () => {
                    actualizarTimestampSesion();
                    abrirDetalleProducto(item);
                };

                const rawImagen = item.Imagen || "";
                const urlImagenOptimizada = optimizarEnlaceImagen(rawImagen);
                const htmlImagen = generarHtmlContenedorImagen(urlImagenOptimizada);

                tarjeta.innerHTML = `
                    <div class="relative pt-[75%] bg-slate-900 overflow-hidden">
                        ${htmlImagen}
                        <span class="absolute top-3 right-3 bg-slate-950/80 text-emerald-400 text-[10px] font-black px-2 py-1 rounded-md tracking-wider uppercase z-10">${item.Marca || 'GENÉRICO'}</span>
                    </div>
                    <div class="p-4 flex flex-col flex-1 justify-between gap-3">
                        <div>
                            <span class="text-[11px] font-mono font-bold text-slate-400 tracking-wide block mb-1">SKU: ${item.SKU || '---'}</span>
                            <h3 class="text-sm font-bold text-white line-clamp-2 leading-snug group-hover:text-emerald-400 transition duration-150">${item.Producto || 'Sin Nombre'}</h3>
                        </div>
                    </div>
                `;
                grid.appendChild(tarjeta);
            });

            construirControlesVisualesPaginacion(productosFiltradosGlobal.length);
        }

        function construirControlesVisualesPaginacion(totalElementos) {
            const contenedorSuperior = document.getElementById('paginacion-superior');
            const contenedorInferior = document.getElementById('paginacion-inferior');
                        
            contenedorSuperior.innerHTML = "";
            contenedorInferior.innerHTML = "";

            const totalPaginas = Math.ceil(totalElementos / tarjetasPorPagina);
            if (totalPaginas <= 1) return;

            const crearEstructuraParaContenedor = (contenedorTarget) => {
                const btnAnterior = document.createElement('button');
                btnAnterior.className = "paginacion-btn";
                btnAnterior.innerHTML = `<i class="fa-solid fa-chevron-left"></i> Anterior`;
                btnAnterior.disabled = paginaActual === 1;
                btnAnterior.onclick = () => { paginaActual--; ejecutarOrdenacionYRenderizado(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                contenedorTarget.appendChild(btnAnterior);

                let inicioRango = Math.max(1, paginaActual - 2);
                let finRango = Math.min(totalPaginas, paginaActual + 2);

                if (inicioRango > 1) {
                    const btnPrimera = document.createElement('button');
                    btnPrimera.className = `paginacion-btn ${paginaActual === 1 ? 'activa' : ''}`;
                    btnPrimera.innerText = "1";
                    btnPrimera.onclick = () => { paginaActual = 1; ejecutarOrdenacionYRenderizado(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                    contenedorTarget.appendChild(btnPrimera);

                    if (inicioRango > 2) {
                        const separador = document.createElement('span');
                        separador.className = "px-2 text-slate-500 text-sm align-middle self-center";
                        separador.innerText = "...";
                        contenedorTarget.appendChild(separador);
                    }
                }

                for (let i = inicioRango; i <= finRango; i++) {
                    const btnPagina = document.createElement('button');
                    btnPagina.className = `paginacion-btn ${paginaActual === i ? 'activa' : ''}`;
                    btnPagina.innerText = i;
                    btnPagina.onclick = () => { paginaActual = i; ejecutarOrdenacionYRenderizado(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                    contenedorTarget.appendChild(btnPagina);
                }

                if (finRango < totalPaginas) {
                    if (finRango < totalPaginas - 1) {
                        const separador = document.createElement('span');
                        separador.className = "px-2 text-slate-500 text-sm align-middle self-center";
                        separador.innerText = "...";
                        contenedorTarget.appendChild(separador);
                    }

                    const btnUltima = document.createElement('button');
                    btnUltima.className = `paginacion-btn ${paginaActual === totalPaginas ? 'activa' : ''}`;
                    btnUltima.innerText = totalPaginas;
                    btnUltima.onclick = () => { paginaActual = totalPaginas; ejecutarOrdenacionYRenderizado(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                    contenedorTarget.appendChild(btnUltima);
                }

                const btnSiguiente = document.createElement('button');
                btnSiguiente.className = "paginacion-btn";
                btnSiguiente.innerHTML = `Siguiente <i class="fa-solid fa-chevron-right"></i>`;
                btnSiguiente.disabled = paginaActual === totalPaginas;
                btnSiguiente.onclick = () => { paginaActual++; ejecutarOrdenacionYRenderizado(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                contenedorTarget.appendChild(btnSiguiente);
            };

            crearEstructuraParaContenedor(contenedorSuperior);
            crearEstructuraParaContenedor(contenedorInferior);
        }

        // LÓGICA DE DETALLES EN MODAL
        function abrirDetalleProducto(item) {
            const cuerpo = document.getElementById('modal-cuerpo');
            const rawImg = item.Imagen || "";
            const imgUrl = optimizarEnlaceImagen(rawImg);

            // Generador de lista de compatibilidad limpia
            let compatibilidadHtml = `<p class="text-sm text-slate-400 italic">Universal / Libre compatibilidad</p>`;
            if (item.Compatibilidad && item.Compatibilidad.trim() !== "") {
                const arregloLineas = item.Compatibilidad.split('\n');
                let liElementos = "";
                arregloLineas.forEach(linea => {
                    if(linea.trim() !== "") liElementos += `<li>${linea.trim()}</li>`;
                });
                compatibilidadHtml = `
                    <div class="compatibilidad-container">
                        <div class="compatibilidad-marca">${item.Marca || 'Refacción'}</div>
                        <ul class="lista-compatibilidad-modal">${liElementos}</ul>
                    </div>
                `;
            }

            cuerpo.innerHTML = `
                <div class="rounded-xl overflow-hidden bg-slate-900 relative pt-[75%] mb-4 group cursor-zoom-in" onclick="abrirZoomImagen('${imgUrl}')">
                    <img src="${imgUrl}" referrerpolicy="no-referrer" onerror="gestionarFalloImagenDrive(this)" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition duration-150">
                        <i class="fa-solid fa-magnifying-glass-plus text-white text-2xl"></i>
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <span class="text-xs font-mono font-bold text-emerald-400">SKU: ${item.SKU || '---'}</span>
                    <h2 class="text-lg font-bold text-white leading-snug">${item.Producto || 'Sin Nombre'}</h2>
                    <div class="flex justify-between items-center bg-slate-900 px-4 py-2.5 rounded-xl border border-slate-700 my-2">
                        <span class="text-xs font-bold text-slate-400 uppercase">Categoría</span>
                        <span class="text-sm font-bold text-slate-200">${item.Categoria || 'General'}</span>
                    </div>
                    <h4 class="text-xs font-bold uppercase tracking-wide text-slate-400 mt-2 mb-1">Modelos Compatibles:</h4>
                    ${compatibilidadHtml}
                </div>
            `;
            alternarModal();
        }

        function alternarModal() {
            const modal = document.getElementById('modal-detalles');
            const contenido = document.getElementById('modal-contenido');
            
            if (modal.classList.contains('opacity-0')) {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                contenido.classList.remove('translate-y-4');
            } else {
                modal.classList.add('opacity-0', 'pointer-events-none');
                contenido.classList.add('translate-y-4');
            }
        }

        function cerrarModalExterno(e) {
            if (e.target.id === 'modal-detalles') alternarModal();
        }

        // CONTROL DE ZOOM COMPLETO PARA IMÁGENES EN GRANDE
        function abrirZoomImagen(url) {
            if(!url) return;
            const modalZoom = document.getElementById('modal-zoom-imagen');
            const imgAmpliada = document.getElementById('img-ampliada');
            
            imgAmpliada.src = url;
            modalZoom.classList.remove('opacity-0', 'pointer-events-none');
            imgAmpliada.classList.remove('scale-95');
        }

        function cerrarZoomImagen() {
            const modalZoom = document.getElementById('modal-zoom-imagen');
            const imgAmpliada = document.getElementById('img-ampliada');
            
            modalZoom.classList.add('opacity-0', 'pointer-events-none');
            imgAmpliada.classList.add('scale-95');
        }
    </script>
</body>
