<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA BARATA DEL HOGAR - Catálogo Maestro de Refacciones</title>
    <style>
        /* Paleta de colores: Base oscura original con acentos de Grupo Camejo (#22B14C / #1A7F31) */
        :root {
            --bg-principal: #0d1117;
            --bg-tarjetas: #161b22;
            --bg-modal: #1f242c;
            --texto-blanco: #ffffff;
            --texto-mutado: #8b949e;
            --acento-camejo: #22b14c;
            --acento-camejo-hover: #1a7f31;
            --borde-tarjeta: #30363d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 0.5px;
        }

        .buscador-contenedor {
            position: relative;
            width: 100%;
        }

        .buscador-contenedor input {
            width: 100%;
            padding: 14px 20px;
            background-color: var(--bg-tarjetas);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 8px;
            color: var(--texto-blanco);
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .buscador-contenedor input:focus {
            border-color: var(--acento-camejo);
        }

        /* Rejilla de productos */
        .catalogo-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Tarjetas estilo Glide */
        .tarjeta-producto {
            background-color: var(--bg-tarjetas);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 280px;
        }

        .tarjeta-producto:hover {
            transform: translateY(-4px);
            border-color: var(--acento-camejo);
        }

        .imagen-placeholder {
            width: 100%;
            height: 140px;
            background-color: var(--bg-principal);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--texto-mutado);
            font-size: 18px;
            margin-bottom: 12px;
        }

        .marca-tag {
            align-self: flex-start;
            background-color: rgba(34, 177, 76, 0.15);
            color: var(--acento-camejo);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .producto-titulo {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .producto-sku {
            font-size: 12px;
            color: var(--texto-mutado);
        }

        /* Modal / Ventana Emergente estilo Detalle de GlideApps */
        .modal-detalles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
            padding: 15px;
        }

        .modal-detalles.activo {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-contenido {
            background-color: var(--bg-modal);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: deslizar 0.3s ease;
        }

        @keyframes deslizar {
            from { transform: translateY(20px); }
            to { transform: translateY(0); }
        }

        .btn-cerrar {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--texto-blanco);
            font-size: 24px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: rgba(250,250,250,0.1);
        }

        .modal-cuerpo {
            padding: 24px;
        }

        .modal-imagen {
            width: 100%;
            height: 200px;
            background-color: var(--bg-principal);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--texto-mutado);
            margin-bottom: 20px;
            font-size: 20px;
        }

        .modal-info-principal {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--borde-tarjeta);
            padding-bottom: 15px;
        }

        .modal-titulo {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .seccion-compatibilidad {
            background-color: var(--bg-principal);
            border-radius: 10px;
            padding: 16px;
            border-left: 4px solid var(--acento-camejo);
        }

        .seccion-compatibilidad h3 {
            font-size: 14px;
            color: var(--acento-camejo);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .lista-compatibilidad {
            list-style: none;
        }

        .lista-compatibilidad li {
            font-size: 14px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
        }

        .lista-compatibilidad li::before {
            content: "•";
            color: var(--acento-camejo);
            font-weight: bold;
            display: inline-block; 
            width: 1em;
            margin-left: 3px;
        }

        .lista-compatibilidad li:last-child {
            border-bottom: none;
        }

        .estado-carga {
            text-align: center;
            color: var(--texto-mutado);
            padding: 40px;
            grid-column: 1 / -1;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <header>
        <h1>LA BARATA DEL HOGAR</h1>
        <div class="buscador-contenedor">
            <input type="text" id="inputBuscador" placeholder="Buscar por SKU, refacción, marca o moto compatible...">
        </div>
    </header>

    <main class="catalogo-grid" id="contenedorCatalogo">
        <div class="estado-carga">Consultando Google Sheets en tiempo real...</div>
    </main>

    <div class="modal-detalles" id="modalDetalles" onclick="cerrarModalExterno(event)">
        <div class="modal-contenido">
            <button class="btn-cerrar" onclick="alternarModal()">&times;</button>
            <div class="modal-cuerpo" id="modalCuerpo">
                </div>
        </div>
    </div>

    <script>
        // URL de tu API Web App de Google Apps Script
        const URL_API = "https://script.google.com/macros/s/AKfycbxxDGEGAiX-fp7RAseVvXs-qjaoaV6D8yGKjAbGCmrLhOfCI-3rr2CXLW7FzcOJdEhk/exec"; 
        
        let inventarioMaestro = [];

        // Inicializar la carga de datos al abrir la página
        async function cargarInventario() {
            try {
                // Modifica los parámetros según requiera tu función doPost en Apps Script
                const respuesta = await fetch(URL_API, {
                    method: 'POST',
                    body: JSON.stringify({ action: "obtenerInventario" })
                });
                const datos = await respuesta.json();
                
                if(datos.success || Array.isArray(datos)) {
                    // Adaptar según la estructura exacta de retorno de tu JSON
                    inventarioMaestro = datos.inventario || datos; 
                    renderizarCatalogo(inventarioMaestro);
                } else {
                    document.getElementById('contenedorCatalogo').innerHTML = `<div class="estado-carga">Error al estructurar los datos del servidor.</div>`;
                }
            } catch (error) {
                console.error("Error cargando inventario:", error);
                document.getElementById('contenedorCatalogo').innerHTML = `<div class="estado-carga">Error de conexión con la base de datos de Sheets.</div>`;
            }
        }

        // Renderiza las tarjetas del catálogo en pantalla
        function renderizarCatalogo(productos) {
            const contenedor = document.getElementById('contenedorCatalogo');
            contenedor.innerHTML = "";

            if(productos.length === 0) {
                contenedor.innerHTML = `<div class="estado-carga">No se encontraron productos coincidentes.</div>`;
                return;
            }

            productos.forEach((prod, indice) => {
                // Ajusta los índices [0], [1], [2] según el orden de tus columnas en Sheets (SKU, Producto, Marca, Compatibilidad)
                const sku = prod[0];
                const titulo = prod[1];
                const marca = prod[2] || 'Genérico';
                const compatibilidadTexto = prod[3] || 'Universal';

                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-producto';
                tarjeta.onclick = () => abrirDetalleProducto(prod);

                tarjeta.innerHTML = `
                    <div>
                        <div class="imagen-placeholder">Sin Foto</div>
                        <span class="marca-tag">${marca}</span>
                        <div class="producto-titulo">${titulo}</div>
                    </div>
                    <div class="producto-sku">SKU: ${sku}</div>
                `;
                contenedor.appendChild(tarjeta);
            });
        }

        // Buscador interactivo en tiempo real
        document.getElementById('inputBuscador').addEventListener('input', function(e) {
            const termino = e.target.value.toLowerCase().trim();
            
            const productosFiltrados = inventarioMaestro.filter(prod => {
                const sku = String(prod[0]).toLowerCase();
                const titulo = String(prod[1]).toLowerCase();
                const marca = String(prod[2]).toLowerCase();
                const compatibilidad = String(prod[3]).toLowerCase();

                return sku.includes(termino) || 
                       titulo.includes(termino) || 
                       marca.includes(termino) || 
                       compatibilidad.includes(termino);
            });

            renderizarCatalogo(productosFiltrados);
        });

        // Desplegar la vista de lista de compatibilidades (Estilo Glide)
        function abrirDetalleProducto(prod) {
            const sku = prod[0];
            const titulo = prod[1];
            const marca = prod[2] || 'Genérico';
            const compatibilidadTexto = prod[3] || '';

            // Procesar el texto largo de compatibilidades separado por comas o saltos de línea para pasarlo a una lista estructurada
            let listaHtml = "";
            if(compatibilidadTexto) {
                const modelos = compatibilidadTexto.split(/[,\n]/);
                modelos.forEach(modelo => {
                    if(modelo.trim()) {
                        listaHtml += `<li>${modelo.trim()}</li>`;
                    }
                });
            } else {
                listaHtml = "<li>Compatibilidad universal / genérica</li>";
            }

            const cuerpoModal = document.getElementById('modalCuerpo');
            cuerpoModal.innerHTML = `
                <div class="modal-imagen">Sin Foto</div>
                <div class="modal-info-principal">
                    <span class="marca-tag">${marca}</span>
                    <h2 class="modal-titulo">${titulo}</h2>
                    <div class="producto-sku">SKU único: ${sku}</div>
                </div>
                <div class="seccion-compatibilidad">
                    <h3>Modelos Compatibles</h3>
                    <ul class="lista-compatibilidad">
                        ${listaHtml}
                    </ul>
                </div>
            `;

            alternarModal();
        }

        function alternarModal() {
            const modal = document.getElementById('modalDetalles');
            modal.classList.toggle('activo');
        }

        function cerrarModalExterno(e) {
            if(e.target.id === "modalDetalles") {
                alternarModal();
            }
        }

        // Llamar la carga inicial
        window.onload = cargarInventario;
    </script>
</body>
</html>
