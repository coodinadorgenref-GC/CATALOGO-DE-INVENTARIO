<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA BARATA DEL HOGAR - Catálogo Maestro de Refacciones</title>
    <style>
        /* Paleta de colores: Base oscura original con acentos de Grupo Camejo (#22B14C) */
        :root {
            --bg-principal: #0d1117;
            --bg-tarjetas: #161b22;
            --bg-modal: #1f242c;
            --texto-blanco: #ffffff;
            --texto-mutado: #8b949e;
            --acento-camejo: #22b14c;
            --acento-camejo-hover: #1a7f31;
            --borde-tarjeta: #30363d;
            --error-bg: #2d191e;
            --error-texto: #ff7b72;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            min-height: 100vh;
        }

        /* --- PANTALLA DE LOGIN --- */
        .seccion-login {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .tarjeta-login {
            background-color: var(--bg-tarjetas);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 16px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .tarjeta-login h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .tarjeta-login .subtitulo {
            color: var(--texto-mutado);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .grupo-input {
            text-align: left;
            margin-bottom: 20px;
        }

        .grupo-input label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--texto-mutado);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .grupo-input input {
            width: 100%;
            padding: 14px;
            background-color: var(--bg-principal);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 8px;
            color: var(--texto-blanco);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .grupo-input input:focus {
            border-color: var(--acento-camejo);
        }

        .btn-primario {
            width: 100%;
            padding: 14px;
            background-color: var(--acento-camejo);
            border: none;
            border-radius: 8px;
            color: var(--texto-blanco);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primario:hover {
            background-color: var(--acento-camejo-hover);
        }

        .btn-primario:disabled {
            background-color: var(--borde-tarjeta);
            color: var(--texto-mutado);
            cursor: not-allowed;
        }

        .alerta-error {
            background-color: var(--error-bg);
            border: 1px solid rgba(255,123,114,0.2);
            color: var(--error-texto);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        /* --- CONTENEDOR PRINCIPAL DEL CATÁLOGO --- */
        .seccion-catalogo {
            display: none;
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-usuario {
            font-size: 14px;
            color: var(--texto-mutado);
        }

        .info-usuario strong {
            color: var(--acento-camejo);
        }

        .buscador-contenedor {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 30px auto;
        }

        .buscador-contenedor input {
            width: 100%;
            padding: 14px 20px;
            background-color: var(--bg-tarjetas);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 8px;
            color: var(--texto-blanco);
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .buscador-contenedor input:focus {
            border-color: var(--acento-camejo);
        }

        .catalogo-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        /* Tarjetas */
        .tarjeta-producto {
            background-color: var(--bg-tarjetas);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 290px;
        }

        .tarjeta-producto:hover {
            transform: translateY(-4px);
            border-color: var(--acento-camejo);
        }

        .imagen-placeholder {
            width: 100%;
            height: 145px;
            background-color: var(--bg-principal);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--texto-mutado);
            font-size: 18px;
            margin-bottom: 12px;
        }

        .marca-tag {
            align-self: flex-start;
            background-color: rgba(34, 177, 76, 0.15);
            color: var(--acento-camejo);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .producto-titulo {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .producto-sku {
            font-size: 12px;
            color: var(--texto-mutado);
        }

        /* --- MODAL DE DETALLES (ESTILO GLIDEAPPS) --- */
        .modal-detalles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
            padding: 15px;
        }

        .modal-detalles.activo {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-contenido {
            background-color: var(--bg-modal);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: deslizar 0.3s ease;
        }

        @keyframes deslizar {
            from { transform: translateY(20px); }
            to { transform: translateY(0); }
        }

        .btn-cerrar {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--texto-blanco);
            font-size: 24px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.1);
        }

        .modal-cuerpo {
            padding: 24px;
        }

        .modal-imagen {
            width: 100%;
            height: 200px;
            background-color: var(--bg-principal);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--texto-mutado);
            margin-bottom: 20px;
            font-size: 20px;
        }

        .modal-info-principal {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--borde-tarjeta);
            padding-bottom: 15px;
        }

        .modal-titulo {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .seccion-compatibilidad {
            background-color: var(--bg-principal);
            border-radius: 10px;
            padding: 16px;
            border-left: 4px solid var(--acento-camejo);
        }

        .seccion-compatibilidad h3 {
            font-size: 14px;
            color: var(--acento-camejo);
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .lista-compatibilidad {
            list-style: none;
        }

        .lista-compatibilidad li {
            font-size: 14px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
        }

        .lista-compatibilidad li::before {
            content: "•";
            color: var(--acento-camejo);
            font-weight: bold;
            display: inline-block; 
            width: 1em;
            margin-left: 2px;
        }

        .lista-compatibilidad li:last-child {
            border-bottom: none;
        }

        .estado-carga {
            text-align: center;
            color: var(--texto-mutado);
            padding: 40px;
            grid-column: 1 / -1;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <section class="seccion-login" id="vistaLogin">
        <div class="tarjeta-login">
            <h2>LA BARATA DEL HOGAR</h2>
            <p class="subtitulo">Ingresa tu correo autorizado para desbloquear el buscador visual e identificar compatibilidades.</p>
            
            <div class="grupo-input">
                <label for="correoUsuario">Correo Electrónico</label>
                <input type="email" id="correoUsuario" placeholder="ejemplo@taller.com">
            </div>
            
            <button class="btn-primario" id="btnAcceder" onclick="ejecutarInicioSesion()">Acceder al Catálogo</button>
            <div class="alerta-error" id="mensajeError"></div>
        </div>
    </section>

    <section class="seccion-catalogo" id="vistaCatalogo">
        <header>
            <h1>LA BARATA DEL HOGAR</h1>
            <div class="info-usuario">Usuario Activo: <strong id="nombreUsuarioActivo">Cargando...</strong></div>
        </header>

        <div class="buscador-contenedor">
            <input type="text" id="inputBuscador" placeholder="Buscar por SKU, refacción, marca o moto compatible...">
        </div>

        <main class="catalogo-grid" id="contenedorCatalogo">
            <div class="estado-carga">Consultando Google Sheets en tiempo real...</div>
        </main>
    </section>

    <div class="modal-detalles" id="modalDetalles" onclick="cerrarModalExterno(event)">
        <div class="modal-contenido">
            <button class="btn-cerrar" onclick="alternarModal()">&times;</button>
            <div class="modal-cuerpo" id="modalCuerpo">
                </div>
        </div>
    </div>

    <script>
        // URL de tu API Web App en Google Apps Script
        const URL_API = "https://script.google.com/macros/s/AKfycbxdBDD9g288VVYEh10oL3qlOnHMptmDsIKjASKVhiugzoiNGIGVnVBTniGlaBVmAiu9/exec"; 
        
        let inventarioMaestro = [];
        let correoActual = "";
        let tokenActual = "";

        // Paso 1: Control del Login contra el Google Script
        async function ejecutarInicioSesion() {
            const inputCorreo = document.getElementById('correoUsuario');
            const btn = document.getElementById('btnAcceder');
            const errorDiv = document.getElementById('mensajeError');
            
            const correo = inputCorreo.value.toLowerCase().trim();
            if(!correo) return;

            // Bloquear interfaz durante la consulta
            btn.disabled = true;
            btn.innerText = "Verificando...";
            errorDiv.style.display = "none";

            try {
                const respuesta = await fetch(URL_API, {
                    method: 'POST',
                    mode: 'cors',
                    body: JSON.stringify({
                        action: "login",
                        correo: correo
                    })
                });
                
                const resultado = await respuesta.json();

                if(resultado.success) {
                    correoActual = correo;
                    tokenActual = resultado.token;
                    document.getElementById('nombreUsuarioActivo').innerText = resultado.nombre || correo;
                    
                    // Transición de vistas
                    document.getElementById('vistaLogin').style.display = 'none';
                    document.getElementById('vistaCatalogo').style.display = 'block';
                    
                    // Cargar el inventario usando los tokens obtenidos
                    await consultarInventarioServidor();
                } else {
                    mostrarError(resultado.message || "Acceso denegado. Correo no registrado.");
                }
            } catch (error) {
                console.error(error);
                mostrarError("Error en servidor o problemas de conexión.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Acceder al Catálogo";
            }
        }

        function mostrarError(msg) {
            const errorDiv = document.getElementById('mensajeError');
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
        }

        // Paso 2: Consultar la base de datos completa de Refacciones
        async function consultarInventarioServidor() {
            const contenedor = document.getElementById('contenedorCatalogo');
            try {
                const respuesta = await fetch(URL_API, {
                    method: 'POST',
                    mode: 'cors',
                    body: JSON.stringify({
                        action: "obtenerInventario",
                        token: tokenActual,
                        correo: correoActual
                    })
                });
                
                const datos = await respuesta.json();
                
                // Si tu Apps Script devuelve la lista directamente en un array, o encapsulado en .inventario
                inventarioMaestro = datos.inventario || datos;

                if (Array.isArray(inventarioMaestro)) {
                    renderizarCatalogo(inventarioMaestro);
                } else {
                    contenedor.innerHTML = `<div class="estado-carga">Error al estructurar los datos del servidor.</div>`;
                }
            } catch (error) {
                console.error(error);
                contenedor.innerHTML = `<div class="estado-carga">Error de comunicación con la base de datos de Sheets.</div>`;
            }
        }

        // Paso 3: Renderizado de tarjetas visuales en la Grid
        function renderizarCatalogo(productos) {
            const contenedor = document.getElementById('contenedorCatalogo');
            contenedor.innerHTML = "";

            if(productos.length === 0) {
                contenedor.innerHTML = `<div class="estado-carga">No se encontraron productos coincidentes.</div>`;
                return;
            }

            // Omitimos la primera fila si es el encabezado de las columnas (SKU, PRODUCTO, etc.)
            const inicio = (productos[0] && String(productos[0][0]).toLowerCase() === 'sku') ? 1 : 0;

            for(let i = inicio; i < productos.length; i++) {
                const prod = productos[i];
                const sku = prod[0];
                const titulo = prod[1];
                const marca = prod[2] || 'Genérico';

                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-producto';
                tarjeta.onclick = () => abrirDetalleProducto(prod);

                tarjeta.innerHTML = `
                    <div>
                        <div class="imagen-placeholder">Sin Foto</div>
                        <span class="marca-tag">${marca}</span>
                        <div class="producto-titulo">${titulo}</div>
                    </div>
                    <div class="producto-sku">SKU: ${sku}</div>
                `;
                contenedor.appendChild(tarjeta);
            }
        }

        // Paso 4: Buscador interactivo en tiempo real
        document.getElementById('inputBuscador').addEventListener('input', function(e) {
            const termino = e.target.value.toLowerCase().trim();
            
            // Filtrar sobre el array cargado en memoria para no saturar peticiones al servidor
            const productosFiltrados = inventarioMaestro.filter((prod, index) => {
                if(index === 0 && String(prod[0]).toLowerCase() === 'sku') return false; // Ignorar cabecera

                const sku = String(prod[0]).toLowerCase();
                const titulo = String(prod[1]).toLowerCase();
                const marca = String(prod[2]).toLowerCase();
                const compatibilidad = String(prod[3] || '').toLowerCase();

                return sku.includes(termino) || 
                       titulo.includes(termino) || 
                       marca.includes(termino) || 
                       compatibilidad.includes(termino);
            });

            renderizarCatalogo(productosFiltrados);
        });

        // Paso 5: Abrir detalles en lista emergente (Estilo GlideApps)
        function abrirDetalleProducto(prod) {
            const sku = prod[0];
            const titulo = prod[1];
            const marca = prod[2] || 'Genérico';
            const compatibilidadTexto = prod[3] || '';

            // Fragmentar el bloque largo de compatibilidades por comas o saltos de línea
            let listaHtml = "";
            if(compatibilidadTexto && compatibilidadTexto.toLowerCase() !== 'compatibilidad universal / genérica') {
                const modelos = compatibilidadTexto.split(/[,\n]/);
                modelos.forEach(modelo => {
                    if(modelo.trim()) {
                        listaHtml += `<li>${modelo.trim()}</li>`;
                    }
                });
            } else {
                listaHtml = "<li>Compatibilidad universal / genérica</li>";
            }

            const cuerpoModal = document.getElementById('modalCuerpo');
            cuerpoModal.innerHTML = `
                <div class="modal-imagen">Sin Foto</div>
                <div class="modal-info-principal">
                    <span class="marca-tag">${marca}</span>
                    <h2 class="modal-titulo">${titulo}</h2>
                    <div class="producto-sku">SKU único: ${sku}</div>
                </div>
                <div class="seccion-compatibilidad">
                    <h3>Modelos Compatibles</h3>
                    <ul class="lista-compatibilidad">
                        ${listaHtml}
                    </ul>
                </div>
            `;

            alternarModal();
        }

        function alternarModal() {
            const modal = document.getElementById('modalDetalles');
            modal.classList.toggle('activo');
        }

        function cerrarModalExterno(e) {
            if(e.target.id === "modalDetalles") {
                alternarModal();
            }
        }
    </script>
</body>
</html>
